# Deploy Template — build and deploy a basilisk toolkit template to IC mainnet.
#
# Triggered manually. Choose which template(s) to deploy and the install mode.

name: Deploy Template

on:
    workflow_dispatch:
        inputs:
            template:
                description: "Template to deploy"
                required: true
                type: choice
                options:
                    - tip_jar
                    - file_registry
                    - all
                default: tip_jar
            mode:
                description: "Install mode"
                required: true
                type: choice
                options:
                    - upgrade
                    - reinstall
                default: upgrade

env:
    PYTHON_VERSION: "3.13"
    DFX_VERSION: "0.30.2"
    NETWORK: ic
    TIP_JAR_BACKEND_CANISTER_ID: o6z3g-eiaaa-aaaau-agj6q-cai
    TIP_JAR_FRONTEND_CANISTER_ID: ox2q2-saaaa-aaaau-agj7a-cai
    FILE_REGISTRY_BACKEND_CANISTER_ID: od2mb-wyaaa-aaaac-qgmza-cai
    FILE_REGISTRY_FRONTEND_CANISTER_ID: oe3kv-3aaaa-aaaac-qgmzq-cai

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DFX_WARNING: -mainnet_plaintext_identity
            WASI_SDK_VERSION: "24"
            WASI_SDK_PATH: /home/runner/.local/share/wasi-sdk
            BASILISK_PYTHON_BACKEND: cpython
            BASILISK_COMPILE_RUST_PYTHON_STDLIB: false
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=${{ env.DFX_VERSION }} sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Import DFX identity
              run: |
                  echo "${{ secrets.IC_IDENTITY_PEM }}" > /tmp/ci-identity.pem
                  dfx identity import ci-deploy /tmp/ci-identity.pem --storage-mode plaintext 2>/dev/null || true
                  rm /tmp/ci-identity.pem
                  dfx identity use ci-deploy

            - name: Install basilisk + toolkit
              run: |
                  pip install "ic-basilisk"
                  pip install .

            - name: Pre-download canister template
              run: |
                  VERSION=$(python3 -c "import basilisk; print(basilisk.__version__)")
                  TEMPLATE_DIR="$HOME/.config/basilisk/${VERSION}"
                  mkdir -p "$TEMPLATE_DIR"
                  curl -Lf "https://github.com/smart-social-contracts/basilisk/releases/download/cpython-wasm-3.13.0/cpython_canister_template.wasm" \
                    -o "$TEMPLATE_DIR/cpython_canister_template.wasm"
                  echo "Template cached at $TEMPLATE_DIR/cpython_canister_template.wasm ($(du -sh "$TEMPLATE_DIR/cpython_canister_template.wasm" | cut -f1))"

            # ── tip_jar ──────────────────────────────────────────────────────

            - name: Generate build info (tip_jar)
              if: ${{ inputs.template == 'tip_jar' || inputs.template == 'all' }}
              run: |
                  python3 - <<'PYEOF'
                  import json, subprocess, datetime

                  ORG = "smart-social-contracts"
                  PACKAGES = {
                      "basilisk":          {"repo": "basilisk",          "module": "basilisk"},
                      "toolkit":           {"repo": "ic-basilisk-toolkit", "module": "ic_basilisk_toolkit"},
                      "ic_python_db":      {"repo": "ic-python-db",      "module": "ic_python_db"},
                      "ic_python_logging": {"repo": "ic-python-logging", "module": "ic_python_logging"},
                  }

                  info = {}
                  for key, pkg in PACKAGES.items():
                      try:
                          ver = subprocess.check_output(
                              ["python3", "-c", f"import {pkg['module']}; print({pkg['module']}.__version__)"],
                              text=True,
                          ).strip()
                      except Exception:
                          ver = "unknown"

                      commit_hash = ""
                      commit_date = ""
                      try:
                          raw = subprocess.check_output(
                              ["curl", "-sf", f"https://api.github.com/repos/{ORG}/{pkg['repo']}/commits/main"],
                              text=True,
                          )
                          data = json.loads(raw)
                          commit_hash = data["sha"][:8]
                          commit_date = data["commit"]["committer"]["date"]
                      except Exception:
                          pass

                      info[key] = {"version": ver, "commit": commit_hash, "date": commit_date}

                  import sys
                  info["cpython"] = sys.version.split()[0]
                  info["built_at"] = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

                  out = "# Auto-generated at build time — do not edit\nBUILD_INFO = " + json.dumps(info, indent=4) + "\n"
                  with open("templates/tip_jar/src/backend/_build_info.py", "w") as f:
                      f.write(out)
                  print(out)
                  PYEOF

            - name: Build backend WASM (tip_jar)
              if: ${{ inputs.template == 'tip_jar' || inputs.template == 'all' }}
              working-directory: templates/tip_jar
              run: |
                  CANISTER_CANDID_PATH=./tip_jar_backend.did python -m basilisk tip_jar_backend src/backend/main.py
                  ls -la .basilisk/tip_jar_backend/tip_jar_backend.wasm

            - name: Deploy backend (tip_jar, ${{ inputs.mode }})
              if: ${{ inputs.template == 'tip_jar' || inputs.template == 'all' }}
              working-directory: templates/tip_jar
              env:
                  BACKEND_CANISTER_ID: ${{ env.TIP_JAR_BACKEND_CANISTER_ID }}
              run: |
                  MODE="${{ inputs.mode }}"
                  if [ "$MODE" = "reinstall" ]; then
                      echo "Stopping canister $BACKEND_CANISTER_ID..."
                      dfx canister stop "$BACKEND_CANISTER_ID" --network "$NETWORK" 2>/dev/null || true
                      sleep 3
                  fi
                  dfx canister install "$BACKEND_CANISTER_ID" \
                      --mode "$MODE" --yes --network "$NETWORK" \
                      --wasm .basilisk/tip_jar_backend/tip_jar_backend.wasm
                  if [ "$MODE" = "reinstall" ]; then
                      dfx canister start "$BACKEND_CANISTER_ID" --network "$NETWORK"
                  fi
                  dfx canister call "$BACKEND_CANISTER_ID" status --network "$NETWORK" || echo "⚠️ status call failed"

            - name: Deploy frontend (tip_jar)
              if: ${{ inputs.template == 'tip_jar' || inputs.template == 'all' }}
              working-directory: templates/tip_jar
              run: |
                  dfx deploy tip_jar_frontend --network "$NETWORK" --upgrade-unchanged
                  echo "Frontend: https://$TIP_JAR_FRONTEND_CANISTER_ID.icp0.io"

            # ── file_registry ────────────────────────────────────────────────

            - name: Build backend WASM (file_registry)
              if: ${{ inputs.template == 'file_registry' || inputs.template == 'all' }}
              working-directory: templates/file_registry
              run: |
                  CANISTER_CANDID_PATH=./ic_file_registry.did python3 -m basilisk ic_file_registry src/main.py
                  ls -la .basilisk/ic_file_registry/ic_file_registry.wasm

            - name: Deploy backend (file_registry, ${{ inputs.mode }})
              if: ${{ inputs.template == 'file_registry' || inputs.template == 'all' }}
              working-directory: templates/file_registry
              env:
                  BACKEND_CANISTER_ID: ${{ env.FILE_REGISTRY_BACKEND_CANISTER_ID }}
              run: |
                  MODE="${{ inputs.mode }}"
                  if [ "$MODE" = "reinstall" ]; then
                      echo "Stopping canister $BACKEND_CANISTER_ID..."
                      dfx canister stop "$BACKEND_CANISTER_ID" --network "$NETWORK" 2>/dev/null || true
                      sleep 3
                  fi
                  dfx canister install "$BACKEND_CANISTER_ID" \
                      --mode "$MODE" --yes --network "$NETWORK" \
                      --wasm .basilisk/ic_file_registry/ic_file_registry.wasm
                  if [ "$MODE" = "reinstall" ]; then
                      dfx canister start "$BACKEND_CANISTER_ID" --network "$NETWORK"
                  fi
                  dfx canister call "$BACKEND_CANISTER_ID" status --network "$NETWORK" || echo "⚠️ status call failed"

            - name: Deploy frontend (file_registry)
              if: ${{ inputs.template == 'file_registry' || inputs.template == 'all' }}
              working-directory: templates/file_registry
              run: |
                  dfx deploy ic_file_registry_frontend --network "$NETWORK" --upgrade-unchanged
                  echo "Frontend: https://$FILE_REGISTRY_FRONTEND_CANISTER_ID.icp0.io"

            # ── summary ──────────────────────────────────────────────────────

            - name: Summary
              run: |
                  echo "## Template Deployment" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Template**: ${{ inputs.template }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Mode**: ${{ inputs.mode }}" >> $GITHUB_STEP_SUMMARY
                  if [[ "${{ inputs.template }}" == "tip_jar" || "${{ inputs.template }}" == "all" ]]; then
                      echo "- **tip_jar backend**: [$TIP_JAR_BACKEND_CANISTER_ID](https://dashboard.internetcomputer.org/canister/$TIP_JAR_BACKEND_CANISTER_ID)" >> $GITHUB_STEP_SUMMARY
                      echo "- **tip_jar frontend**: [https://$TIP_JAR_FRONTEND_CANISTER_ID.icp0.io](https://$TIP_JAR_FRONTEND_CANISTER_ID.icp0.io)" >> $GITHUB_STEP_SUMMARY
                  fi
                  if [[ "${{ inputs.template }}" == "file_registry" || "${{ inputs.template }}" == "all" ]]; then
                      echo "- **file_registry backend**: [$FILE_REGISTRY_BACKEND_CANISTER_ID](https://dashboard.internetcomputer.org/canister/$FILE_REGISTRY_BACKEND_CANISTER_ID)" >> $GITHUB_STEP_SUMMARY
                      echo "- **file_registry frontend**: [https://$FILE_REGISTRY_FRONTEND_CANISTER_ID.icp0.io](https://$FILE_REGISTRY_FRONTEND_CANISTER_ID.icp0.io)" >> $GITHUB_STEP_SUMMARY
                  fi
