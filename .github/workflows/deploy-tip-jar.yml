# Deploy Tip Jar — build and deploy the tip jar template to IC mainnet.
#
# Triggered manually. Choose between reinstall (wipes state) and upgrade
# (preserves stable memory / StableBTreeMap data).

name: Deploy Tip Jar

on:
    workflow_dispatch:
        inputs:
            mode:
                description: "Install mode"
                required: true
                type: choice
                options:
                    - upgrade
                    - reinstall
                default: upgrade

env:
    PYTHON_VERSION: "3.13"
    DFX_VERSION: "0.30.2"
    BACKEND_CANISTER_ID: o6z3g-eiaaa-aaaau-agj6q-cai
    FRONTEND_CANISTER_ID: ox2q2-saaaa-aaaau-agj7a-cai
    NETWORK: ic

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DFX_WARNING: -mainnet_plaintext_identity
            WASI_SDK_VERSION: "24"
            WASI_SDK_PATH: /home/runner/.local/share/wasi-sdk
            BASILISK_PYTHON_BACKEND: cpython
            BASILISK_COMPILE_RUST_PYTHON_STDLIB: false
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dfx
              run: |
                  DFXVM_INIT_YES=true DFX_VERSION=${{ env.DFX_VERSION }} sh -ci "$(curl -fsSL https://sdk.dfinity.org/install.sh)"
                  echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH

            - name: Import DFX identity
              run: |
                  echo "${{ secrets.IC_IDENTITY_PEM }}" > /tmp/ci-identity.pem
                  dfx identity import ci-deploy /tmp/ci-identity.pem --storage-mode plaintext 2>/dev/null || true
                  rm /tmp/ci-identity.pem
                  dfx identity use ci-deploy

            - name: Install basilisk + toolkit
              run: |
                  pip install "ic-basilisk>=0.11.15"
                  pip install -e .

            - name: Pre-download canister template
              run: |
                  VERSION=$(python3 -c "import basilisk; print(basilisk.__version__)")
                  TEMPLATE_DIR="$HOME/.config/basilisk/${VERSION}"
                  mkdir -p "$TEMPLATE_DIR"
                  curl -Lf "https://github.com/smart-social-contracts/basilisk/releases/download/cpython-wasm-3.13.0/cpython_canister_template.wasm" \
                    -o "$TEMPLATE_DIR/cpython_canister_template.wasm"
                  echo "Template cached at $TEMPLATE_DIR/cpython_canister_template.wasm ($(du -sh "$TEMPLATE_DIR/cpython_canister_template.wasm" | cut -f1))"

            - name: Build backend WASM
              working-directory: templates/tip_jar
              run: |
                  CANISTER_CANDID_PATH=./tip_jar_backend.did python -m basilisk tip_jar_backend src/backend/main.py
                  ls -la .basilisk/tip_jar_backend/tip_jar_backend.wasm

            - name: Deploy backend (${{ inputs.mode }})
              working-directory: templates/tip_jar
              run: |
                  MODE="${{ inputs.mode }}"
                  echo "Deploying backend with --mode $MODE ..."

                  if [ "$MODE" = "reinstall" ]; then
                      echo "Stopping canister $BACKEND_CANISTER_ID..."
                      dfx canister stop "$BACKEND_CANISTER_ID" --network "$NETWORK" 2>/dev/null || true
                      sleep 3
                  fi

                  dfx canister install "$BACKEND_CANISTER_ID" \
                      --mode "$MODE" \
                      --yes \
                      --network "$NETWORK" \
                      --wasm .basilisk/tip_jar_backend/tip_jar_backend.wasm

                  if [ "$MODE" = "reinstall" ]; then
                      dfx canister start "$BACKEND_CANISTER_ID" --network "$NETWORK"
                  fi

                  echo "Verifying backend is reachable..."
                  dfx canister call "$BACKEND_CANISTER_ID" status --network "$NETWORK"

            - name: Deploy frontend
              working-directory: templates/tip_jar
              run: |
                  dfx deploy tip_jar_frontend --network "$NETWORK" --upgrade-unchanged
                  echo "Frontend: https://$FRONTEND_CANISTER_ID.icp0.io"

            - name: Summary
              run: |
                  echo "## Tip Jar Deployment" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Mode**: ${{ inputs.mode }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Backend**: [$BACKEND_CANISTER_ID](https://dashboard.internetcomputer.org/canister/$BACKEND_CANISTER_ID)" >> $GITHUB_STEP_SUMMARY
                  echo "- **Frontend**: [https://$FRONTEND_CANISTER_ID.icp0.io](https://$FRONTEND_CANISTER_ID.icp0.io)" >> $GITHUB_STEP_SUMMARY
