name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Run Tests (no IC)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: pip install build twine setuptools wheel

      - name: Verify version consistency
        run: |
          SETUP_VERSION=$(python -c "import re; print(re.search(r'version=\"([^\"]+)\"', open('setup.py').read()).group(1))")
          BUMP_VERSION=$(grep 'current_version' .bumpversion.cfg | head -1 | cut -d= -f2 | tr -d ' ')
          echo "setup.py version: $SETUP_VERSION"
          echo ".bumpversion.cfg version: $BUMP_VERSION"
          if [ "$SETUP_VERSION" != "$BUMP_VERSION" ]; then
            echo "ERROR: Version mismatch between setup.py ($SETUP_VERSION) and .bumpversion.cfg ($BUMP_VERSION)"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/* --skip-existing
