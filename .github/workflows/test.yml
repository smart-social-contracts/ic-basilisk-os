name: Run Tests (no IC)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.7'
      - name: Install ic-basilisk
        run: pip install ic-basilisk
      - name: Install toolkit (editable) + dev deps
        run: |
          pip install -e .
          pip install -r requirements-dev.txt
      - name: Verify installation
        run: |
          python -c "import ic_basilisk_toolkit; print(f'ic-basilisk-toolkit {ic_basilisk_toolkit.__version__}')"
          python -c "from ic_basilisk_toolkit.shell import canister_exec; print('shell OK')"
          python -c "from ic_basilisk_toolkit.status import TaskStatus; print('status OK')"
          python -c "from ic_basilisk_toolkit.cli import main; print('cli OK')"
      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_canister -x
